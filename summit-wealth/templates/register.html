<!DOCTYPE html>
<html>
<head>
  <title>Summit - Create Account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial;
      background: #0a0e27;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1f3a;
      border: 1px solid #d4af37;
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo { text-align: center; margin-bottom: 8px; font-size: 28px; color: #d4af37; font-weight: bold; }
    .subtitle { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 28px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #333;
      background: #0a0e27;
      color: #fff;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #d4af37; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #d4af37;
      color: #0a0e27;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #c49e2a; }
    .btn:disabled { background: #666; cursor: not-allowed; }
    .error {
      background: rgba(255,69,96,0.15);
      border: 1px solid #ff4560;
      color: #ff4560;
      padding: 10px 12px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }
    .success {
      background: rgba(0,224,144,0.1);
      border: 1px solid #00e090;
      color: #00e090;
      padding: 10px 12px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }
    .divider { text-align: center; margin: 20px 0 5px; font-size: 13px; color: #aaa; }
    a { color: #d4af37; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .pin-note { font-size: 11px; color: #666; margin-top: 4px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#128176; SUMMIT</div>
    <div class="subtitle">Create your trading account</div>

    <div class="error" id="err"></div>
    <div class="success" id="suc"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Trader" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="john@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+254 700 000000" autocomplete="tel">
    </div>
    <div class="row">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pass" placeholder="Min 6 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="pass2" placeholder="Repeat password" autocomplete="new-password">
      </div>
    </div>
    <div class="form-group">
      <label>Withdrawal PIN (6 digits)</label>
      <input type="password" id="pin" placeholder="e.g. 123456" maxlength="6" inputmode="numeric">
      <div class="pin-note">Used to authorize withdrawals. Keep it safe.</div>
    </div>

    <button class="btn" id="submitBtn" onclick="register()">Create Account</button>

    <div class="divider">Already have an account? <a href="/">Sign in</a></div>
  </div>

  <script>
    async function register() {
      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const pass  = document.getElementById('pass').value;
      const pass2 = document.getElementById('pass2').value;
      const pin   = document.getElementById('pin').value;

      hideMessages();

      if (!name)               return showErr('Full name is required.');
      if (!email)              return showErr('Email address is required.');
      if (pass.length < 6)     return showErr('Password must be at least 6 characters.');
      if (pass !== pass2)      return showErr('Passwords do not match.');
      if (!/^\d{6}$/.test(pin)) return showErr('PIN must be exactly 6 digits.');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password: pass, pin })
        });
        const d = await r.json();
        if (d.success) {
          showSuc('Account created! Redirecting to dashboard...');
          setTimeout(() => { window.location = d.data.redirect; }, 1200);
        } else {
          showErr(d.error || 'Registration failed. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      } catch (e) {
        showErr('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('err');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function showSuc(msg) {
      const el = document.getElementById('suc');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideMessages() {
      document.getElementById('err').style.display = 'none';
      document.getElementById('suc').style.display = 'none';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
  </script>
</body>
</html>
