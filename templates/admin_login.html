<!DOCTYPE html>
<html>
<head>
  <title>Summit Wealth — Admin Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0e27;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .brand { font-size:22px; font-weight:bold; color:#d4af37; margin-bottom:6px; letter-spacing:1px; }
    .brand-sub { font-size:11px; color:#555; margin-bottom:32px; text-transform:uppercase; letter-spacing:2px; }
    .card {
      background: #1a1f3a;
      border: 1px solid #d4af37;
      border-radius: 12px;
      padding: 36px 40px;
      width: 100%;
      max-width: 400px;
    }
    .lock {
      text-align: center;
      font-size: 36px;
      margin-bottom: 18px;
    }
    .card-title { font-size:15px; font-weight:bold; color:#d4af37; margin-bottom:4px; }
    .card-sub   { font-size:12px; color:#555; margin-bottom:26px; }
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:11px; color:#aaa; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
    input {
      width:100%; padding:11px 14px;
      background:#0a0e27; border:1px solid #2a2f4a;
      color:#fff; border-radius:6px; font-size:14px; outline:none;
      transition: border-color 0.2s;
    }
    input:focus { border-color:#d4af37; }
    .btn {
      width:100%; padding:13px;
      background:#d4af37; color:#0a0e27;
      border:none; border-radius:6px;
      font-size:14px; font-weight:bold;
      cursor:pointer; margin-top:6px;
      transition: background 0.2s;
    }
    .btn:hover    { background:#c9a430; }
    .btn:disabled { background:#6b5a1e; cursor:not-allowed; }
    .error {
      background: rgba(255,69,96,0.1);
      border: 1px solid #ff4560;
      color: #ff4560;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 18px;
      display: none;
    }
    .back { margin-top:18px; text-align:center; font-size:12px; color:#555; }
    .back a { color:#d4af37; text-decoration:none; }
    .footer { margin-top:20px; font-size:11px; color:#333; }
  </style>
</head>
<body>

  <div class="brand">&#128176; SUMMIT WEALTH</div>
  <div class="brand-sub">Administration Portal</div>

  <div class="card">
    <div class="lock">&#128737;</div>
    <div class="card-title">Admin Sign In</div>
    <div class="card-sub">Restricted access — authorised personnel only</div>

    <div class="error" id="err"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="btn" onclick="login()">Sign In</button>

    <div class="back"><a href="/">&#8592; Back to client login</a></div>
  </div>

  <div class="footer">&#128274; Secure session &nbsp;|&nbsp; Summit Wealth &copy; 2025</div>

<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function login() {
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    err.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;

    if (!email || !pass) {
      err.textContent  = '✗ Please enter your email and password.';
      err.style.display = 'block';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Signing in…';

    try {
      const r = await fetch('/api/auth/login', {
        method:      'POST',
        credentials: 'same-origin',
        headers:     { 'Content-Type': 'application/json' },
        body:        JSON.stringify({ email, password: pass, admin: true })
      });
      const d = await r.json();

      if (d.success) {
        btn.textContent = '✓ Redirecting…';
        window.location.href = d.data.redirect || '/admin/dashboard';
      } else {
        err.textContent  = '✗ ' + (d.error || 'Login failed.');
        err.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    } catch (e) {
      err.textContent  = '✗ Network error. Please try again.';
      err.style.display = 'block';
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
