<!DOCTYPE html>
<html>
<head>
  <title>Summit Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial;
      background: #0a0e27;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1f3a;
      border: 1px solid #d4af37;
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
    }
    .admin-badge {
      position: absolute;
      top: -12px;
      right: 24px;
      background: #d4af37;
      color: #0a0e27;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .logo { text-align: center; margin-bottom: 8px; font-size: 30px; color: #d4af37; font-weight: bold; }
    .subtitle { text-align: center; margin-bottom: 30px; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; text-transform: uppercase; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      background: #0a0e27;
      color: #fff;
      border-radius: 5px;
    }
    input:focus { outline: none; border-color: #d4af37; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      color: #0a0e27;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 10px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #ff4560;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
      font-size: 13px;
    }
    a { color: #d4af37; text-decoration: none; }
    .back-link {
      display: block;
      text-align: center;
      font-size: 12px;
      margin-top: 18px;
    }
    .back-link a { color: #888; }
    .back-link a:hover { color: #d4af37; }
  </style>
</head>
<body>
  <div class="card">
    <div class="admin-badge">Admin</div>
    <div class="logo">&#128176; SUMMIT</div>
    <div class="subtitle">Administrator Access</div>
    <div class="error" id="err"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@summitwealthfx.space" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••">
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
    <p class="back-link"><a href="/">&larr; Back to client login</a></p>
  </div>
  <script>
    async function login() {
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('err');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing In...';

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('pass').value,
            admin: true
          })
        });
        const d = await r.json();
        if (d.success) {
          window.location = d.data.redirect;
        } else {
          errEl.textContent = d.error;
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Network error — please try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
