<!DOCTYPE html>
<html>
<head>
  <title>Summit Wealth — Reset Password</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0e27; color: #fff; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .brand { font-size:22px; font-weight:bold; color:#d4af37; margin-bottom:6px; letter-spacing:1px; }
    .brand-sub { font-size:11px; color:#555; margin-bottom:32px; text-transform:uppercase; letter-spacing:2px; }
    .card {
      background:#1a1f3a; border:1px solid #d4af37; border-radius:12px;
      padding:36px 40px; width:100%; max-width:400px;
    }
    .lock { text-align:center; font-size:36px; margin-bottom:18px; }
    .card-title { font-size:15px; font-weight:bold; color:#d4af37; margin-bottom:4px; }
    .card-sub   { font-size:12px; color:#555; margin-bottom:26px; }
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:11px; color:#aaa; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
    input {
      width:100%; padding:11px 14px; background:#0a0e27;
      border:1px solid #2a2f4a; color:#fff; border-radius:6px;
      font-size:14px; outline:none; transition: border-color 0.2s;
    }
    input:focus { border-color:#d4af37; }
    .btn {
      width:100%; padding:13px; background:#d4af37; color:#0a0e27;
      border:none; border-radius:6px; font-size:14px; font-weight:bold;
      cursor:pointer; margin-top:6px; transition: background 0.2s;
    }
    .btn:hover    { background:#c9a430; }
    .btn:disabled { background:#6b5a1e; cursor:not-allowed; }
    .error, .success {
      padding:10px 14px; border-radius:6px; font-size:12px;
      margin-bottom:18px; display:none;
    }
    .error   { background:rgba(255,69,96,0.1); border:1px solid #ff4560; color:#ff4560; }
    .success { background:rgba(46,204,113,0.1); border:1px solid #2ecc71; color:#2ecc71; }
    .back { margin-top:18px; text-align:center; font-size:12px; color:#555; }
    .back a { color:#d4af37; text-decoration:none; }
  </style>
</head>
<body>
  <div class="brand">&#128176; SUMMIT WEALTH</div>
  <div class="brand-sub">Reset Password</div>

  <div class="card">
    <div class="lock">&#128273;</div>
    <div class="card-title">Forgot your password?</div>
    <div class="card-sub">Verify your identity with the details below to set a new password.</div>

    <div class="error" id="err"></div>
    <div class="success" id="ok"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autofocus>
    </div>
    <div class="form-group">
      <label>Registered Phone Number</label>
      <input type="text" id="phone" placeholder="07XXXXXXXX">
    </div>
    <div class="form-group">
      <label>6-Digit PIN</label>
      <input type="password" id="pin" maxlength="6" placeholder="••••••">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new_password" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirm_password" placeholder="Re-enter new password">
    </div>

    <button class="btn" id="btn" onclick="resetPw()">Reset Password</button>

    <div class="back"><a href="/">&#8592; Back to login</a></div>
  </div>

<script>
async function resetPw() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const okB = document.getElementById('ok');
  err.style.display = 'none';
  okB.style.display = 'none';

  const email   = document.getElementById('email').value.trim();
  const phone   = document.getElementById('phone').value.trim();
  const pin     = document.getElementById('pin').value.trim();
  const pw      = document.getElementById('new_password').value;
  const pwCheck = document.getElementById('confirm_password').value;

  if (!email || !phone || !pin || !pw) {
    err.textContent = '✗ Please fill in every field.';
    err.style.display = 'block';
    return;
  }
  if (pw !== pwCheck) {
    err.textContent = '✗ New passwords do not match.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Resetting…';

  try {
    const r = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, phone, pin, new_password: pw })
    });
    const d = await r.json();

    if (d.success) {
      okB.textContent = '✓ ' + d.data.message;
      okB.style.display = 'block';
      btn.textContent = 'Done';
      setTimeout(() => window.location.href = '/', 2000);
    } else {
      err.textContent = '✗ ' + (d.error || 'Reset failed.');
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  } catch (e) {
    err.textContent = '✗ Network error. Please try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') resetPw(); });
</script>
</body>
</html>
