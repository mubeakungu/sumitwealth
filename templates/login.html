<!DOCTYPE html>
<html>
<head>
  <title>Summit Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial;
      background: #0a0e27;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1f3a;
      border: 1px solid #d4af37;
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 30px; font-size: 30px; color: #d4af37; font-weight: bold; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; text-transform: uppercase; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      background: #0a0e27;
      color: #fff;
      border-radius: 5px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      color: #0a0e27;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 10px;
    }
    .error {
      background: #ff4560;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
    }
    a { color: #d4af37; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#128176; SUMMIT</div>
    <div class="error" id="err"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="john@test.com" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pass" placeholder="demo1234">
    </div>
    <button class="btn" onclick="login()">Sign In</button>
    <p style="margin-top: 15px; text-align: center; font-size: 12px;">
      <a href="/register">Create an account</a> &nbsp;|&nbsp; <a href="/admin">Admin Login</a>
    </p>
  </div>

  <script>
    async function login() {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('pass').value,
          admin: false
        })
      });
      const d = await r.json();
      if (d.success) {
        window.location = d.data.redirect;
      } else {
        const el = document.getElementById('err');
        el.innerHTML = d.error;
        el.style.display = 'block';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
