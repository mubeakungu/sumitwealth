<!DOCTYPE html>
<html>
<head>
  <title>Summit Wealth — Register</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Arial,sans-serif; background:#0a0e27; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#1a1f3a; border:1px solid #d4af37; border-radius:10px; padding:40px; width:100%; max-width:420px; }
    .logo     { text-align:center; margin-bottom:6px; font-size:26px; color:#d4af37; font-weight:bold; }
    .logo-sub { text-align:center; font-size:11px; color:#555; letter-spacing:2px; margin-bottom:28px; }
    .ref-banner {
      background:rgba(0,224,144,0.1); border:1px solid #00e090;
      border-radius:6px; padding:10px 14px; margin-bottom:18px;
      font-size:12px; color:#00e090; display:none;
    }
    .ref-banner.show { display:block; }
    .form-group { margin-bottom:14px; }
    label { display:block; margin-bottom:5px; font-size:11px; color:#aaa; }
    input { width:100%; padding:11px 12px; border:1px solid #333; background:#0a0e27; color:#fff; border-radius:5px; font-size:13px; }
    input:focus { outline:none; border-color:#d4af37; }
    .btn { width:100%; padding:13px; background:#d4af37; color:#0a0e27; border:none; border-radius:5px; font-weight:bold; font-size:14px; cursor:pointer; margin-top:8px; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .error   { background:rgba(255,69,96,0.15); border:1px solid #ff4560; color:#ff4560; padding:10px; border-radius:5px; margin-bottom:14px; font-size:12px; display:none; }
    .error.show { display:block; }
    .links { margin-top:16px; text-align:center; font-size:12px; color:#555; }
    .links a { color:#d4af37; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#128176; SUMMIT WEALTH</div>
    <div class="logo-sub">Create Account</div>

    <div class="ref-banner" id="refBanner"></div>
    <div class="error" id="err"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Trader">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="john@example.com">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="phone" placeholder="+254 7XX XXX XXX">
    </div>
    <div class="form-group">
      <label>Password (min 6 characters)</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label>PIN (6 digits — for withdrawals)</label>
      <input type="password" id="pin" maxlength="6" placeholder="••••••">
    </div>

    <button class="btn" id="regBtn" onclick="register()">Create Account</button>

    <div class="links">
      Already have an account? <a href="/">Login here</a>
    </div>
  </div>

  <script>
    // Auto-read referral code from URL ?ref=XXXX
    const urlParams = new URLSearchParams(window.location.search);
    const refCode   = urlParams.get('ref') || '';

    if (refCode) {
      const banner = document.getElementById('refBanner');
      banner.innerHTML = '&#127881; You were referred! You\'ll be joining with a referral bonus active.';
      banner.classList.add('show');
    }

    async function register() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const pin      = document.getElementById('pin').value;
      const errEl    = document.getElementById('err');
      const btn      = document.getElementById('regBtn');

      errEl.classList.remove('show');

      if (!name)              { showErr('Enter your full name');      return; }
      if (!email)             { showErr('Enter your email');          return; }
      if (password.length<6)  { showErr('Password min 6 characters'); return; }
      if (pin.length!==6 || isNaN(pin)) { showErr('PIN must be exactly 6 digits'); return; }

      btn.disabled    = true;
      btn.textContent = 'Creating account...';

      try {
        const r = await fetch('/api/auth/register', {
          method:'POST',
          credentials:'same-origin',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({name, email, phone, password, pin, ref_code: refCode})
        });
        const d = await r.json();
        if (d.success) {
          btn.textContent = '&#9989; Redirecting...';
          window.location.href = '/dashboard';
        } else {
          showErr(d.error || 'Registration failed');
        }
      } catch(e) {
        showErr('Network error. Please try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Create Account';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('err');
      el.textContent = msg;
      el.classList.add('show');
    }

    document.addEventListener('keydown', e => { if(e.key==='Enter') register(); });
  </script>
</body>
</html>
